name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install the latest version of uv without problem matchers
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          add-problem-matchers: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Report SIMD target
        shell: bash
        run: |
          echo "OS=${{ matrix.os }} ARCH=${{ matrix.arch }} PY=${{ matrix.python-version }}"
          uv run python -c "import platform; print('machine:', platform.machine())"

      - name: Run tests
        run: uv run pytest python/tests/ -v
